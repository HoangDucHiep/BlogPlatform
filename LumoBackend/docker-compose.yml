services:
  # API backend
  lumo.api:
    image: ${DOCKER_REGISTRY-}lumoapi
    container_name: lumo.api
    build:
      context: .
      dockerfile: Lumo.Api/Dockerfile
    depends_on:
      lumo.db:
        condition: service_healthy
      idprovider:
        condition: service_started
    networks:
      - lumo_network
    environment:
      - Keycloak__Authority=http://idprovider:8080/realms/lumoblog

  # Set up postgres database
  lumo.db:
    image: postgres:17
    container_name: lumo.db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./.containers/database:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - ${POSTGRES_PORT}:5432
    networks:
      - lumo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - ${PGADMIN_PORT}:80
    depends_on:
      - lumo.db
    volumes:
      - ./.containers/pgadmin:/var/lib/pgadmin
    networks:
      - lumo_network

  # Identity Provider configuration
  # Setup Keycloak
  idprovider:
    image: quay.io/keycloak/keycloak:26.3
    command: start
    container_name: lumo.keycloak
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://lumo.db:5432/${KEYCLOAK_DB}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    ports:
      - ${KEYCLOAK_PORT}:8080
    depends_on:
      lumo.db:
        condition: service_healthy
    networks:
      - lumo_network
    volumes:
      - ./.containers/keycloak:/opt/keycloak/data
      - ./.file/import/lumoblog-realm-export.json:/opt/keycloak/data/import/lumoblog-realm-export.json
      
networks:
  lumo_network:
    driver: bridge